version: "3.8"

services:
  # ── Laravel API ──
  api:
    build:
      context: ./laravel-api
      dockerfile: Dockerfile
    container_name: rentglobe-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${API_URL:-http://localhost:8000}
      - DB_CONNECTION=pgsql
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT:-6543}
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - api-storage:/var/www/html/storage
    networks:
      - rentglobe

  # ── Nuxt Frontend ──
  web:
    build:
      context: ./nuxt-app
      dockerfile: Dockerfile
    container_name: rentglobe-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=${API_URL:-http://:8000}/api/v1
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - rentglobe

volumes:
  api-storage:

networks:
  rentglobe:
    driver: bridge